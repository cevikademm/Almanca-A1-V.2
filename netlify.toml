# Netlify yapılandırması — statik site, build yok. Uygulama app/ içinde.
[build]
  publish = "app"
  command = ""

# İçerik türleri ve önbellek
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# HTML her zaman yeniden doğrulansın → yeni sürüm damgalı asset linkleri hemen gelir
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
